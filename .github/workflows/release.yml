name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish .\MangaReader.Native\MangaReader.Native.csproj -c Release -r win-x64 --self-contained true -o .\publish

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "MangaReader-win-x64-$tag.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path .\publish\* -DestinationPath $zip -Force

      - name: Upload Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "MangaReader-win-x64-$tag.zip"
          if (gh release view $tag 2>$null) {
            gh release upload $tag $zip --clobber
          } else {
            gh release create $tag $zip --title $tag --notes "MangaReader Windows x64 release."
          }
